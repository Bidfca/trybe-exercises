<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css"
        integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
    <link rel="stylesheet" href="css/DatePickerX.min.css">
    <link rel="stylesheet" href="css/justValidateTooltip.min.css">

    <title>Form</title>
</head>

<body>
    <form action="#" class="js-form mb-3">
        <fieldset>
            <legend>Dados pessoais:</legend>

            <label for="nome">Nome:</label>
            <div class="just-validate-tooltip-container">
                <input type="text" name="nome" data-validate-field="name">
            </div>

            <label for="email">Email:</label>
            <div class="just-validate-tooltip-container">
                <input type="text" name="email" data-validate-field="email">
            </div>

            <label for="cpf">CPF:</label>
            <div class="just-validate-tooltip-container">
                <input type="text" name="cpf" data-validate-field="cpf">
            </div>

            <label for="endereco">Endereço:</label>
            <div class="just-validate-tooltip-container">
                <input type="text" name="endereco" data-validate-field="endereco">
            </div>

            <label for="cidade">Cidade:</label>
            <div class="just-validate-tooltip-container">
                <input type="text" name="cidade" data-validate-field="cidade">
            </div>

            <label for="estado" class="mt-3 mb-2">Estado:</label>
            <select id="estado" name="estado"></select>

            <p>Complemento:</p>
            <div class="just-validate-tooltip-container">
                <input type="radio" name="complemento" id="casa" data-validate-field="radio">
                <label for="complemento">Casa</label>
                <input type="radio" name="complemento" id="apartamento" data-validate-field="radio">
                <label for="complemento">Apartamento</label>
            </div>
        </fieldset>

        <fieldset class="mt-4 mb-3">
            <legend>Dados último emprego:</legend>

            <label for="curriculo">Resumo curriculo:</label>
            <div class="just-validate-tooltip-container">
                <textarea id="curriculo" name="curriculo" data-validate-field="curriculo"></textarea>
            </div>

            <label for="cargo">Cargo:</label>
            <div class="just-validate-tooltip-container">
                <input id="cargo" name="cargo" data-validate-field="cargo">
            </div>

            <label for="descricao">Descrição do Cargo:</label>
            <div class="just-validate-tooltip-container">
                <input id="descricao" name="descricao" data-validate-field="descricao">
            </div>

            <label for="data">Data de início:</label>
            <div class="just-validate-tooltip-container">
                <input id="data" name="data" data-validate-field="data">
            </div>
        </fieldset>

        <div>
            <button id="limpar" class="btn btn-secondary">Limpar</button>
            <button type="submit" id="enviar" class="btn btn-primary">Enviar</button>
        </div>
    </form>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"
        integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx"
        crossorigin="anonymous"></script>
    <script src="js/DatePickerX.min.js"></script>
    <script src="js/just-validate.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
