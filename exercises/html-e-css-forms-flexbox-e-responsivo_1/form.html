<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>

<body>
    <form action="#">
        <fieldset>
            <legend>Dados pessoais:</legend>

            <label for="nome">Nome:</label>
            <input type="text" name="nome" maxlength="40" required>

            <label for="email">Email:</label>
            <input type="text" name="email" maxlength="50" required>

            <label for="cpf">CPF:</label>
            <input type="text" name="cpf" maxlength="11" required>

            <label for="endereco">Endereço:</label>
            <input type="text" name="endereco" maxlength="200" required>

            <label for="cidade">Cidade:</label>
            <input type="text" name="cidade" maxlength="28" required>

            <label for="estado">Estado:</label>
            <select id="estado" name="estado" required></select>

            <p>Complemento:</p>
            <input type="radio" name="complemento" id="casa" value="casa">
            <label for="complemento">Casa</label>
            <input type="radio" name="complemento" id="apartamento" value="apartamento">
            <label for="complemento">Apartamento</label>
        </fieldset>

        <fieldset>
            <legend>Dados último emprego:</legend>

            <label for="curriculo">Resumo curriculo:</label>
            <textarea id="curriculo" name="curriculo" maxlength="1000" required></textarea>

            <label for="cargo">Cargo:</label>
            <input id="cargo" name="cargo" maxlength="40" required>

            <label for="descricao">Descrição do Cargo:</label>
            <input id="descricao" name="descricao" maxlength="500" required>

            <label for="data">Data de início:</label>
            <input id="data" name="data" maxlength="10" required>
        </fieldset>

        <p id="mensagem"></p>
        
        <button id="limpar">Limpar</button>
        <button type="submit" id="enviar">Enviar</button>
    </form>

    <script src="script.js"></script>
</body>

</html>
